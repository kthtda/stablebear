name: BuildWheels

on:
  workflow_dispatch:
    inputs:
      cpu_only:
        description: 'Build CPU-only wheels on every platform (no CUDA)'
        type: boolean
        default: false
  workflow_call:
    inputs:
      cpu_only:
        description: 'Build CPU-only wheels on every platform (no CUDA)'
        type: boolean
        default: false

jobs:
  # Emit the build matrix as JSON so a single workflow serves both the full
  # release build (CUDA + CPU) and a CPU-only build (cpu_only=true, used by
  # ci.yaml) across every platform. The CUDA-specific steps below are all
  # gated on `matrix.cuda == 1`, so they no-op for CPU-only rows.
  setup:
    name: Resolve build matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        shell: bash
        run: |
          if [ "${{ inputs.cpu_only }}" == "true" ]; then
            MATRIX='{"include":[{"os":"ubuntu-24.04","cuda":0,"artifact_suffix":"-cpu"},{"os":"ubuntu-22.04-arm","cuda":0,"artifact_suffix":"-cpu"},{"os":"macos-26","cuda":0,"artifact_suffix":"-cpu"},{"os":"windows-2022","cuda":0,"artifact_suffix":"-cpu"}]}'
          else
            MATRIX='{"include":[{"os":"ubuntu-24.04","cuda":1,"cuda_tag":"12-8","cuda_major":12,"artifact_suffix":"-cuda12"},{"os":"ubuntu-24.04","cuda":1,"cuda_tag":"13-1","cuda_major":13,"artifact_suffix":"-cuda13"},{"os":"ubuntu-22.04-arm","cuda":0,"artifact_suffix":"-cpu"},{"os":"macos-26","cuda":0,"artifact_suffix":"-cpu"},{"os":"windows-2022","cuda":1,"cuda_version":"12.6","cuda_major":12,"artifact_suffix":"-cuda12"},{"os":"windows-2022","cuda":1,"cuda_version":"13.1","cuda_major":13,"artifact_suffix":"-cuda13"}]}'
          fi
          echo "matrix=$MATRIX" >> "$GITHUB_OUTPUT"

  build_wheels:
    name: Build ${{ matrix.cuda == 1 && format('CUDA{0}+CPU', matrix.cuda_major) || 'CPU' }} wheels on ${{ matrix.os }}
    needs: setup
    runs-on: ${{ matrix.os }}

    # Network-resilience defaults for the host-side uv/pip that cibuildwheel
    # drives on macOS/Windows (e.g. installing matplotlib & friends during the
    # wheel-test phase). The Linux build/test runs in a container, so the same
    # vars are also injected via CIBW_ENVIRONMENT_LINUX / CIBW_TEST_ENVIRONMENT.
    env:
      UV_HTTP_TIMEOUT: 120
      PIP_RETRIES: 5
      PIP_DEFAULT_TIMEOUT: 60

    strategy:
      # Don't let one platform's failure cancel the others.
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}

    steps:

      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'


      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Set build parallelism
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Windows" ]; then
            CORES=$NUMBER_OF_PROCESSORS
          else
            CORES=$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)
          fi
          echo "CMAKE_BUILD_PARALLEL_LEVEL=$CORES" >> $GITHUB_ENV
          echo "Using $CORES core(s) to build..."

      # Activate MSVC FIRST — before conda touches the environment.
      # ilammy/msvc-dev-cmd calls VsDevCmd.bat and exports INCLUDE/LIB/PATH
      # to GITHUB_ENV so they persist for all subsequent steps.
      - name: Activate MSVC (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Setup Miniconda (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        uses: conda-incubator/setup-miniconda@v3
        with:
          auto-activate: true
          activate-environment: ""

      # Install CUDA toolkit from the nvidia conda channel (ensures nvcc, ptxas,
      # and cudart all come from the same coherent version).
      - name: Install CUDA via conda (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: pwsh
        run: |
          # Retry the conda fetch to ride out transient nvidia-channel hiccups.
          $ok = $false
          for ($i = 1; $i -le 5; $i++) {
            conda install -y cuda-compiler=${{ matrix.cuda_version }} -c nvidia
            if ($LASTEXITCODE -eq 0) { $ok = $true; break }
            Write-Host "conda install failed (attempt $i), retrying..."
            Start-Sleep -Seconds ($i * 5)
          }
          if (-not $ok) { exit 1 }
          $condaBase = (conda info --base).Trim()
          $cudaPath = ("$condaBase\Library") -replace '\\', '/'
          "CUDA_PATH=$cudaPath" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          "$cudaPath\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Sanity-check cl & nvcc (Windows)
        if: runner.os == 'Windows' && matrix.cuda == 1
        shell: cmd
        run: |
          where cl
          where nvcc
          nvcc --version


      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        env:
          CIBW_BUILD_VERBOSITY: 1
          CIBW_BUILD_FRONTEND: "build[uv]"
          # Pin cudart to the CUDA major the wheel was built against (CUDA DLLs are not ABI-compatible across majors).
          # Non-CUDA builds use test-requires from pyproject.toml.
          CIBW_TEST_REQUIRES: ${{ matrix.cuda == 1 && format('pytest scipy cuda-toolkit[cudart]=={0}.*', matrix.cuda_major) || 'pytest scipy' }}
          # The wheel-test phase installs the wheel + its runtime deps (incl.
          # matplotlib) via uv; a longer HTTP timeout absorbs slow/transient
          # PyPI fetches that otherwise time out after uv's short default.
          CIBW_TEST_ENVIRONMENT: >-
            UV_HTTP_TIMEOUT=120
            PIP_RETRIES=5
            PIP_DEFAULT_TIMEOUT=60
          CIBW_MANYLINUX_X86_64_IMAGE: "manylinux_2_28"
          CIBW_BEFORE_ALL_LINUX: >-
            bash -c '
            [ "$(uname -m)" != "x86_64" ] && exit 0;
            [ -f /lib/ld-musl-x86_64.so.1 ] && exit 0;
            [ "${{ matrix.cuda }}" != "1" ] && exit 0;
            curl -fsS --retry 5 --retry-delay 2 --retry-all-errors -o /etc/yum.repos.d/cuda.repo
            https://developer.download.nvidia.com/compute/cuda/repos/rhel8/x86_64/cuda-rhel8.repo &&
            { n=0; until dnf install -y --nogpgcheck cuda-nvcc-${{ matrix.cuda_tag }} cuda-cudart-devel-${{ matrix.cuda_tag }}; do n=$((n+1)); [ $n -ge 5 ] && exit 1; echo "dnf install failed (attempt $n), retrying..."; sleep $((n*5)); done; } &&
            CUDA_NVCC="$(find /usr/local -path "*/bin/nvcc" -print -quit)" &&
            "$CUDA_NVCC" --version &&
            CUDA_DIR="$(dirname "$(dirname "$CUDA_NVCC")")" &&
            ln -sfn "$CUDA_DIR" /usr/local/cuda'
          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >-
            auditwheel repair --exclude 'libcudart*' -w {dest_dir} {wheel}
          CIBW_BEFORE_BUILD_WINDOWS: pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >-
            delvewheel repair --exclude "*cuda*.dll" -w {dest_dir} {wheel}
          CIBW_ENVIRONMENT_LINUX: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            PATH=/usr/local/cuda/bin:$PATH
            CUDAToolkit_ROOT=/usr/local/cuda
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
            UV_HTTP_TIMEOUT=120
          CIBW_ENVIRONMENT_MACOS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            MACOSX_DEPLOYMENT_TARGET=11.0
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
            UV_HTTP_TIMEOUT=120
          CIBW_ENVIRONMENT_WINDOWS: >-
            BUILD_WITH_CUDA=${{ matrix.cuda }}
            CMAKE_BUILD_PARALLEL_LEVEL=$CMAKE_BUILD_PARALLEL_LEVEL
            CMAKE_UNITY_BUILD=ON
            CMAKE_UNITY_BUILD_BATCH_SIZE=4
            UV_HTTP_TIMEOUT=120
            CMAKE_ARGS=${{ matrix.cuda == 1 && '"-G Ninja -DCUDAToolkit_ROOT=${CUDA_PATH} -DCMAKE_CUDA_COMPILER=${CUDA_PATH}/bin/nvcc.exe"' || '' }}
      - uses: actions/upload-artifact@v6
        if: matrix.cuda == 1
        with:
          name: wheels-src-${{ matrix.os }}${{ matrix.artifact_suffix }}
          path: ./wheelhouse/*.whl
          retention-days: 1

      - uses: actions/upload-artifact@v6
        if: matrix.cuda == 0
        with:
          name: wheels-final-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          retention-days: 1

  merge_cuda_wheels:
    # No CUDA wheels exist to merge in CPU-only mode.
    if: ${{ !inputs.cpu_only }}
    runs-on: ubuntu-latest
    needs: build_wheels
    strategy:
      matrix:
        os: [ubuntu-24.04, windows-2022]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          name: wheels-src-${{ matrix.os }}-cuda12
          path: ./wheelhouse-cuda12
      - uses: actions/download-artifact@v8
        with:
          name: wheels-src-${{ matrix.os }}-cuda13
          path: ./wheelhouse-cuda13
      - name: Merge CUDA wheels
        shell: bash
        run: |
          mkdir -p wheelhouse-merged
          for w12 in wheelhouse-cuda12/*.whl; do
            name=$(basename "$w12")
            w13="wheelhouse-cuda13/$name"
            if [ ! -f "$w13" ]; then
              echo "Missing CUDA 13 wheel for $name"
              exit 1
            fi
            python .github/scripts/merge_cuda_wheels.py \
              --base-wheel "$w12" \
              --extra-wheel "$w13" \
              --output-dir wheelhouse-merged \
              --cuda-major 13
          done
      - uses: actions/upload-artifact@v6
        with:
          name: wheels-final-${{ matrix.os }}
          path: ./wheelhouse-merged/*.whl
          retention-days: 1

  merge_wheel_artifacts:
    # Merge once the wheels are built. An explicit condition is required so a
    # skipped merge_cuda_wheels (CPU-only mode) doesn't skip this job too;
    # for the CUDA build it still requires merge_cuda_wheels not to have failed.
    needs: [build_wheels, merge_cuda_wheels]
    if: ${{ !cancelled() && needs.build_wheels.result == 'success' && needs.merge_cuda_wheels.result != 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Merge wheel artifacts
        uses: actions/upload-artifact/merge@v4
        with:
          name: wheels
          pattern: "wheels-final-*"
          retention-days: 2
