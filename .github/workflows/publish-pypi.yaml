name: BuildAndPublishPyPI

on: [workflow_dispatch]

jobs:
  check_version:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check version not already published
        shell: bash
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          PACKAGE=$(grep '^name = ' pyproject.toml | sed 's/name = "\(.*\)"/\1/')
          echo "Checking if $PACKAGE==$VERSION is already on PyPI..."
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" https://pypi.org/pypi/$PACKAGE/$VERSION/json)
          if [ "$STATUS" == "200" ]; then
            echo "❌ $PACKAGE==$VERSION already exists on PyPI!"
            exit 1
          fi
          echo "✅ $PACKAGE==$VERSION not found on PyPI, proceeding..."

  sdist:
    uses: ./.github/workflows/sdist.yaml
    needs: check_version

  build:
    uses: ./.github/workflows/wheels.yaml
    needs: check_version

  merge_all:
    runs-on: ubuntu-latest
    needs: [sdist, build]
    steps:
      - name: Merge wheels and sdist
        uses: actions/upload-artifact/merge@v4
        with:
          name: dist
          pattern: "{wheels,sdist}"
          retention-days: 2

  compare:
    runs-on: ubuntu-latest
    needs: merge_all
    if: github.actor == 'bwehlin'

    steps:
      - uses: actions/checkout@v6

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Compare wheels
        run: |
          set -o pipefail
          echo '```' >> $GITHUB_STEP_SUMMARY
          python -u .github/scripts/compare_wheels.py -v dist/ | tee -a $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

  analysis:
    permissions:
      contents: write
    uses: ./.github/workflows/analysis.yaml
    secrets: inherit
    needs: check_version

  publish:
    runs-on: ubuntu-latest
    needs: [compare, analysis]
    if: github.actor == 'bwehlin'
    environment:
      name: pypi
      url: https://pypi.org/p/stablebear
    permissions:
      id-token: write
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create and push version tag
        run: |
          VERSION=$(grep '^version = ' pyproject.toml | sed 's/version = "\(.*\)"/\1/')
          TAG="v${VERSION}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "$TAG"
          git push origin "$TAG"

  refresh_reports:
    name: Refresh gh-pages with release tag
    runs-on: ubuntu-24.04
    needs: publish
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout gh-pages branch
        uses: actions/checkout@v6
        with:
          ref: gh-pages
          path: gh-pages-branch
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Regenerate index with tag map
        run: |
          git fetch --tags --no-recurse-submodules
          TAG_MAP=$(git tag --list | while read tag; do
            sha=$(git rev-list -n1 "$tag" 2>/dev/null | cut -c1-7)
            [ -n "$sha" ] && echo "${sha}=${tag}"
          done | tr '\n' ' ')
          echo "Tag map: $TAG_MAP"
          python3 .github/scripts/generate_coverage_index.py gh-pages-branch --tag-map $TAG_MAP

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages-branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No report changes to publish."
            exit 0
          fi
          git commit -m "reports: tag release for ${{ github.sha }}"
          # gh-pages is shared, so concurrent runs can leave our push behind the
          # remote (non-fast-forward). Rebase onto the latest remote tip and try
          # again rather than failing on a benign race.
          for attempt in 1 2 3 4 5; do
            if git push origin HEAD:gh-pages; then
              echo "Pushed reports on attempt ${attempt}."
              exit 0
            fi
            echo "Push attempt ${attempt} failed; rebasing onto remote gh-pages and retrying..."
            git fetch origin gh-pages
            git rebase origin/gh-pages || git rebase --abort
            sleep $((attempt * 3))
          done
          echo "Failed to push reports to gh-pages after 5 attempts." >&2
          exit 1
